<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verbs Practice</title>
    <link rel="stylesheet" href="style.css">
    <script src="showInfinitBlock.js" defer></script>
</head>
<body>
    <h1 class="title">Welcome to Irregular Verbs Practice!</h1>
    <div class="container">
        <div class="sett-container">
            <h4>What tense do you want to practice?</h4>
            <div id="radioContainer">
                <input type="radio" id="infinitive" name="tense" value="infinitive">
                <label for="infinitive">Infinitive</label>
                <input type="radio" id="pastSimple" name="tense" value="past simple" checked>
                <label for="pastSimple">Past Simple</label>
                <input type="radio" id="pastParticiple" name="tense" value="past participle">
                <label for="pastParticiple">Past Participle</label>
            </div>
            <div class="if-infin-container" style="display: none;">
                <h4>What tense do you want to show in 'random verb'?</h4>
                <div>
                    <input type="radio" id="infPastSimple" name="inf-tense" value="past simple" checked>
                    <label for="infPastSimple">Past Simple</label>
                    <input type="radio" id="infPastParticiple" name="inf-tense" value="past participle">
                    <label for="infPastParticiple">Past Participle</label>
                </div>
            </div>
            <div class="separator"></div>
            <h4>How many verbs do you want to practice?</h4>
            <div class="sett-bott-container">
                <div>
                    <select name="verb_amount" id="verb_amount">
                        <option value="1">1</option>
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="25">25</option>
                        <option value="30">30</option>
                    </select>
                </div>
                <div>
                    <button type="button" onclick="getSettings()" class="btn-check ">Start Practice</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<script>    
    function getSettings() {
        const tense = document.querySelector('input[name="tense"]:checked').value;
        const verb_amount = document.getElementById("verb_amount").value;
        
        // Store string values in localStorage
        localStorage.setItem('tense', tense);
        if (tense === 'infinitive') {
            const inf_tense = document.querySelector('input[name="inf-tense"]:checked').value;
            localStorage.setItem('inf_tense', inf_tense);
        }
        localStorage.setItem('verb_amount', verb_amount);

        location.href = "practice.html";
    }
</script>
