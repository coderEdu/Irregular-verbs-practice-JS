<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verbs Practice</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1 class="title">Welcome to Irregular Verbs Practice!</h1>
    <div class="container">
        <table>
            <tr>
                <td>
                    <span>1.</span>
                </td>
                <td>
                    <span>Write the past tense of the following irregular verb:</span>
                </td>
                <td>
                    <span id="verb_display">go</span>
                </td>
                <td>
                    <input type="text" name="verb" id="verb_input" placeholder="Enter past tense">
                </td>
                <td>
                    <button id="btn_check">Check spelling</button>
                </td>
                <td class="td_img">
                    <img src="" alt="" srcset="" id="img_success">
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
