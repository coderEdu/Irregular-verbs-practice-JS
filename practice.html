<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verbs Practice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/verbs.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/modal.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <img src="img/english_128.png" alt="" srcset="">
            <div class="header-title-container">
                <h1 class="title">Welcome to Irregular Verbs Practice!</h1>
            </div>
            <span><img src="img/dark_14629873.png" alt="" srcset=""></span>
        </div>
    </header>
    <div class="container">
        <table id="verb_table">
            <tbody></tbody>
        </table>
        <div class="wrong" id="wrong">
            <span>You've failed! right answer: <strong id="spelling"></strong></span>
            <span class="wrong-close" id="wrong_close">❌</span>
        </div>
        <div class="attempt-container">
            <p>Attempt: <span id="attempt_count"></span> of <span id="total_attempts"></span></p>
            <div class="training-container">
                <p>Verbs: <span id="verb_total"></span></p>
                <p>Tense: <span id="tense_training"></span></p>
                <p>Repeat Verbs: <span id="repeat_verbs"></span></p>
            </div>
        </div>
        <div class="input-container">
            <div class="input-child">
                <div>                
                    <input type="text" name="verb" class="verb-input" placeholder="" autofocus> <!-- Enter past tense -->
                </div>
                <div>
                    <button class="btn-check" name="btn_check">Check Spelling</button>
                </div>
            </div>
            <div class="input-child">
                <button class="btn-secc" id="open_modal_btn_def">Def.</button>
                <dialog id="my_def_modal">
                    <h2 id="def_modal_title">Modal Title</h2>
                    <p id="def_content">This is the content of the modal.</p>
                    <button class="btn-secc" id="close_modal_btn_def">Close</button>
                </dialog>

                <button class="btn-secc" id="open_modal_btn_eg">E.g.</button>
                <dialog id="my_eg_modal">
                    <h2 id="eg_modal_title">Modal Title</h2>
                    <p id="eg_content">This is the content of the modal.</p>
                    <button class="btn-secc" id="close_modal_btn_eg">Close</button>
                </dialog>
            </div>
        </div>
    </div>
</body>
</html>
