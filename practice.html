<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verbs Practice</title>
    <link rel="stylesheet" href="style.css">
    <script src="verbs.js" defer></script>
    <script src="app.js" defer></script>
    <script src="modal.js" defer></script>
</head>
<body>
    <h1 class="title">Welcome to Irregular Verbs Practice!</h1>
    <div class="container">
        <table id="verb_table">
            <tbody></tbody>
        </table>
        <div class="input-container">
            <div class="input-child">
                <div>                
                    <input type="text" name="verb" class="verb-input" placeholder="Enter past tense" autofocus>
                </div>
                <div>
                    <button class="btn-check" name="btn_check">Check Spelling</button>
                </div>
            </div>
            <div class="input-child">
                <button class="btn-secc" id="open-modal-btn-def">Def.</button>
                <dialog id="my-modal"> <!-- working here -->
                    <h2 id="def-modal-title">Modal Title</h2>
                    <p id="def-content">This is the content of the modal.</p>
                    <button class="btn-secc" id="close-modal-btn">Close</button>
                </dialog>

                <button class="btn-secc" id="btn_eg">E.g.</button>
            </div>
        </div>
    </div>
</body>
</html>
